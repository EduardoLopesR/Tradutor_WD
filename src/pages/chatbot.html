<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Gemini</title>
    <link rel="stylesheet" href="/src/styles/chatbot.css">
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            Alguma pergunta?
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="message bot-message">Posso responder suas dúvidas sobre a fonte.</div>
        </div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Digite sua mensagem...">
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // Função para adicionar uma mensagem na tela
        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            messageDiv.classList.add(`${sender}-message`);
            // Permite exibir quebras de linha para erros formatados
            messageDiv.innerHTML = text.replace(/\n/g, '<br>');
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Função para enviar a mensagem para o backend, que repassa ao Gemini
        async function sendMessage() {
            const userText = userInput.value.trim();
            if (userText === '') return;

            addMessage(userText, 'user');
            userInput.value = '';

            // Mensagem de carregamento
            addMessage('Analisando a pergunta...', 'bot');
            const loadingMessage = chatMessages.lastChild;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: userText })
                });

                const result = await response.json();

                // 1. Remove a mensagem de carregamento
                loadingMessage.remove();

                // 2. Verifica se o backend retornou erro
                if (!response.ok) {
                    console.error('ERRO DE API (Status ' + response.status + '):', result);
                    let errorMessage = `Erro ${response.status}: Falha na API.`;

                    if (result.error) {
                        errorMessage += `\nDetalhe: ${result.error}`;
                    }

                    addMessage(errorMessage, 'bot');
                    return;
                }

                // 3. Exibe a resposta do bot
                if (result.reply) {
                    addMessage(result.reply, 'bot');
                } else {
                    console.warn('Resposta OK (200), mas sem conteúdo:', result);
                    addMessage('Desculpe, a API respondeu, mas não consegui extrair o texto.', 'bot');
                }

            } catch (error) {
                // 4. Captura erros de rede (ex: backend offline, DNS, Timeouts)
                loadingMessage.remove();
                console.error('Erro ao chamar a API (Network ou Parse):', error);
                addMessage('Ops! Ocorreu um erro de conexão. Verifique o console.', 'bot');
            }
        }

        // Adiciona um evento para o botão de enviar
        sendBtn.addEventListener('click', sendMessage);

        // Adiciona um evento para a tecla 'Enter'
        userInput.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
