<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradutor Wing Dings</title>
    <link rel="stylesheet" href="tradutor.css">
</head>
<body>
    <div id="conteudo">
        <h1>Tradutor Wing Dings</h1>

        <textarea 
            id="texto" 
            placeholder=">Texto"
            oninput="autoResize(this)"
        ></textarea>

        <br>
        <button onclick="traduzir()">Traduzir</button>
        <br>
        <textarea 
            id="resultado" 
            placeholder=">Traduzido"
            readonly
        ></textarea>
    </div>
    <script src="tradutor.js"></script>
</body>
